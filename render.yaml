services:
  - type: web
    name: manga-watchlist
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    # Use gunicorn (not Flask's dev server) so APScheduler + request handling are production-safe.
    startCommand: gunicorn -w 1 --threads 4 -b 0.0.0.0:$PORT app:app
    envVars:
      - key: FLASK_DEBUG
        value: "0"
      # Extension JSON API (/api/series/ensure, /api/progress, /api/unread-count) always
      # requires a dashboard session cookie — no anonymous default user.
      - key: ALLOW_SQLITE_IN_PRODUCTION
        value: "0"
      # Comma-separated exact origins for credentialed cross-origin API calls.
      # Add your app URL and either CHROME_EXTENSION_ID (below) or the full
      # chrome-extension://<id> string after you publish the extension.
      - key: CORS_ALLOW_ORIGINS
        value: "https://mangawatchlist.space,https://www.mangawatchlist.space,https://api.mangawatchlist.space,https://app.mangawatchlist.space"
      # Keep free-tier memory stable: disable Selenium fallback and reduce
      # per-check timeout / concurrency.
      - key: USE_SELENIUM_FALLBACK
        value: "0"
      - key: HTTP_TIMEOUT_SECONDS
        value: "6"
      - key: MAX_CHECK_WORKERS
        value: "10"
      - key: INITIAL_AUTO_CHECK
        value: "0"
      - key: CHECK_STALE_MINUTES
        value: "45"
      - key: PER_SITE_CONCURRENCY
        value: "3"
      # Keep checks fast: skip canonical-resolve retry in normal background checks.
      - key: SCRAPE_RETRY_ON_FAIL
        value: "0"
      # Optional profiling during production debugging (0 keeps logs quiet).
      - key: SCRAPE_TIMING_LOGS
        value: "0"
      - key: SCHEDULER_ENABLED
        value: "1"
      - key: SCHEDULER_LEADER
        value: "1"
      # After Chrome Web Store publish: add CHROME_EXTENSION_ID in the Render dashboard
      # (Environment) with your 32-character extension id — it is merged into the CORS allowlist in app.py.
      # Required for the Chrome extension: cross-site cookies must be SameSite=None+Secure
      # so the chrome-extension:// origin can forward the session cookie on /api/* calls.
      - key: SESSION_COOKIE_SAMESITE
        value: "None"
      - key: SESSION_COOKIE_SECURE
        value: "1"
      - key: DATABASE_URL
        fromDatabase:
          name: manga-watchlist-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true

databases:
  - name: manga-watchlist-db
    plan: free
