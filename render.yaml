services:
  - type: web
    name: zero-hour
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python app.py
    envVars:
      - key: FLASK_DEBUG
        value: "0"
      - key: REQUIRE_API_AUTH
        value: "1"
      - key: ALLOW_SQLITE_IN_PRODUCTION
        value: "0"
      # Required for the Chrome extension: cross-site cookies must be SameSite=None+Secure
      # so the chrome-extension:// origin can forward the session cookie on /api/* calls.
      - key: SESSION_COOKIE_SAMESITE
        value: "None"
      - key: SESSION_COOKIE_SECURE
        value: "1"
      - key: DATABASE_URL
        fromDatabase:
          name: zero-hour-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true

databases:
  - name: zero-hour-db
    plan: free
