<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="{{ site_description }}">
  <title>Edit series - Manga Tracker</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%232563eb'/%3E%3Ctext x='16' y='22' text-anchor='middle' fill='white' font-size='14' font-family='system-ui,sans-serif' font-weight='700'%3EMT%3C/text%3E%3C/svg%3E">
  <style>
    :root {
      --panel: rgba(148, 163, 184, 0.08);
      --border: rgba(148, 163, 184, 0.22);
      --accent-1: #3b82f6;
      --accent-2: #2563eb;
    }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: Inter, Segoe UI, Arial, sans-serif;
      background:
        radial-gradient(420px 280px at 82% 0%, rgba(59, 130, 246, 0.18), transparent 72%),
        radial-gradient(300px 220px at 15% 8%, rgba(79, 70, 229, 0.18), transparent 70%),
        linear-gradient(160deg, #05070d 0%, #0a0d15 50%, #111827 100%);
      color: #e5e7eb;
      padding: 20px;
    }
    .card {
      width: min(480px, 94vw);
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 20px;
      box-shadow: 0 24px 48px rgba(2, 6, 23, 0.42);
      backdrop-filter: blur(12px);
      padding: 24px;
    }
    h1 { margin-top: 0; font-size: clamp(22px, 4vw, 26px); }
    label { display: block; font-size: 13px; color: #94a3b8; margin-bottom: 6px; }
    input {
      width: 100%;
      margin-bottom: 14px;
      padding: 12px;
      border-radius: 12px;
      border: 1px solid rgba(148, 163, 184, 0.3);
      background: rgba(15, 23, 42, 0.55);
      color: #f8fafc;
      box-sizing: border-box;
      outline: none;
    }
    input:focus {
      border-color: #60a5fa;
      box-shadow: 0 0 0 3px rgba(96, 165, 250, 0.2);
    }
    button {
      width: 100%;
      padding: 12px;
      border: 0;
      border-radius: 12px;
      background: linear-gradient(180deg, var(--accent-1) 0%, var(--accent-2) 100%);
      color: #fff;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 0 15px rgba(59, 130, 246, 0.45);
    }
    .back { margin-top: 16px; text-align: center; }
    .back a { color: #93c5fd; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Edit series</h1>
    <form method="post">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <label for="edit-title">Title</label>
      <input id="edit-title" name="title" value="{{ bookmark['title'] }}" required>
      <label for="edit-url">Series URL</label>
      <input id="edit-url" name="url" type="url" value="{{ bookmark['url'] }}" required>
      <button type="submit">Save changes</button>
    </form>
    <p class="back"><a href="{{ url_for('index') }}">Back to dashboard</a></p>
  </div>
</body>
</html>
