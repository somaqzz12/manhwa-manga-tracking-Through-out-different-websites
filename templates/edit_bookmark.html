<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="{{ site_description }}">
  <title>Edit series - Manga Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%236366f1'/%3E%3Ctext x='16' y='21' text-anchor='middle' fill='white' font-size='12' font-family='Inter,system-ui,sans-serif' font-weight='700'%3EMT%3C/text%3E%3C/svg%3E">
  <style>
    :root {
      --bg: #080b14;
      --primary: #6366f1;
      --primary-hi: #818cf8;
      --text: #e2e8f0;
      --muted: #94a3b8;
      --card-border: rgba(255, 255, 255, 0.07);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: Inter, system-ui, sans-serif;
      background: var(--bg);
      background-image:
        radial-gradient(ellipse 720px 420px at 88% -6%, rgba(99, 102, 241, 0.12), transparent 52%),
        radial-gradient(ellipse 500px 360px at 8% 100%, rgba(56, 189, 248, 0.05), transparent 45%);
      color: var(--text);
      padding: 24px 16px;
    }
    .card-wrap {
      position: relative;
      width: min(480px, 100%);
    }
    .back-dash {
      position: absolute;
      left: 0;
      top: -36px;
      font-size: 0.875rem;
      font-weight: 500;
      color: var(--muted);
      text-decoration: none;
      transition: color 0.2s ease;
    }
    .back-dash:hover { color: var(--primary-hi); }
    .card {
      width: 100%;
      background: rgba(15, 23, 42, 0.55);
      border: 1px solid var(--card-border);
      border-radius: 16px;
      box-shadow: 0 24px 60px rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(16px);
      padding: 28px 32px 26px;
      transition: border-color 0.2s ease;
    }
    h1 {
      margin: 0 0 22px;
      font-size: 1.375rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--text);
    }
    label {
      display: block;
      font-size: 0.8125rem;
      font-weight: 500;
      color: var(--muted);
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      margin-bottom: 16px;
      padding: 14px 16px;
      border-radius: 12px;
      border: 1px solid rgba(148, 163, 184, 0.2);
      background: rgba(8, 11, 20, 0.6);
      color: var(--text);
      font-family: inherit;
      font-size: 0.9375rem;
      outline: none;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }
    input::placeholder { color: #64748b; }
    input:focus {
      border-color: rgba(129, 140, 248, 0.65);
      box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.22);
    }
    button[type="submit"] {
      width: 100%;
      margin-top: 6px;
      padding: 14px 20px;
      border: 0;
      border-radius: 999px;
      font-family: inherit;
      font-size: 0.9375rem;
      font-weight: 700;
      cursor: pointer;
      background: linear-gradient(145deg, var(--primary-hi) 0%, var(--primary) 100%);
      color: #f8fafc;
      box-shadow: 0 8px 28px rgba(99, 102, 241, 0.35);
      transition: transform 0.2s ease, box-shadow 0.2s ease, opacity 0.2s ease;
    }
    button[type="submit"]:hover:not(:disabled) {
      transform: translateY(-1px);
      box-shadow: 0 12px 36px rgba(99, 102, 241, 0.42);
    }
    button[type="submit"]:focus-visible {
      outline: 2px solid var(--primary-hi);
      outline-offset: 3px;
    }
    button.is-loading { cursor: wait; opacity: 0.92; }
    .btn-spinner {
      display: inline-block;
      width: 1.25rem;
      height: 1.25rem;
      border: 2px solid rgba(255, 255, 255, 0.35);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.75s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .flash-msgs { margin-bottom: 18px; }
    .flash {
      padding: 12px 14px;
      border-radius: 16px;
      margin-bottom: 10px;
      font-size: 0.875rem;
      font-weight: 600;
      border: 1px solid var(--card-border);
    }
    .flash.success { background: rgba(22, 163, 74, 0.12); border-color: rgba(34, 197, 94, 0.3); color: #bbf7d0; }
    .flash.warning { background: rgba(234, 179, 8, 0.1); border-color: rgba(250, 204, 21, 0.28); color: #fde68a; }
    .flash.error { background: rgba(239, 68, 68, 0.12); border-color: rgba(248, 113, 113, 0.35); color: #fecaca; }
    @media (max-width: 375px) {
      .card { padding: 22px 20px; }
      .back-dash { top: -32px; font-size: 0.8125rem; }
    }
  </style>
</head>
<body>
  <div class="card-wrap">
    <a class="back-dash" href="{{ url_for('index', **edit_back_kw) }}">← Back to dashboard</a>
    <div class="card">
      <h1>Edit series</h1>
      {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
          <div class="flash-msgs" role="region" aria-label="Notifications">
            {% for category, message in messages %}
              <div class="flash {{ category }}">{{ message }}</div>
            {% endfor %}
          </div>
        {% endif %}
      {% endwith %}
      <form method="post" id="editBookmarkForm" data-loading-form="true">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <input type="hidden" name="q" value="{{ return_q or '' }}">
        <input type="hidden" name="sort" value="{{ return_sort }}">
        <input type="hidden" name="page" value="{{ return_page }}">
        <label for="edit-title">Title</label>
        <input id="edit-title" name="title" value="{{ bookmark['title'] }}" placeholder="Series title" aria-label="Title" required>
        <label for="edit-url">Series URL</label>
        <input id="edit-url" name="url" type="text" value="{{ bookmark['url'] }}" placeholder="https://…" aria-label="Series URL" required>
        <button id="editSubmit" type="submit" data-loading-text="">Save changes</button>
      </form>
    </div>
  </div>
  <script>
    const form = document.getElementById("editBookmarkForm");
    const submitBtn = document.getElementById("editSubmit");
    form.addEventListener("submit", () => {
      submitBtn.dataset.originalHtml = submitBtn.innerHTML;
      submitBtn.innerHTML = '<span class="btn-spinner" aria-hidden="true"></span>';
      submitBtn.disabled = true;
      submitBtn.classList.add("is-loading");
      submitBtn.setAttribute("aria-busy", "true");
    });
  </script>
</body>
</html>
