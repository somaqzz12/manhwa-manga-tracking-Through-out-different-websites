<aside class="dashboard-sidebar desktop-sidebar" aria-label="Library navigation">
  <div class="dashboard-sidebar-top">
    <a class="dashboard-brand" href="{{ url_for('index') }}">
      <span class="dashboard-mark">MW</span>
      <span>
        <strong>Manga Watchlist</strong>
        <small>Reading Tracker</small>
      </span>
    </a>
  </div>

  <div class="dashboard-sidebar-search">
    <input id="sidebarSearch" type="search" placeholder="Search titles..." autocomplete="off">
  </div>

  <nav class="dashboard-sidebar-nav">
    <a class="dashboard-nav-item is-active" href="{{ url_for('index') }}">All stories <span class="dashboard-nav-ct">{{ total_count or 0 }}</span></a>
    {% if current_user is defined and current_user and not demo_mode|default(false) %}
    <a class="dashboard-nav-item" href="{{ url_for('next_up') }}">Next up</a>
    {% endif %}
    <span class="dashboard-nav-label">Manage</span>
    <a class="dashboard-nav-item" href="{{ url_for('sources_page') }}">Sources</a>
    <a class="dashboard-nav-item" href="{{ url_for('source_requests_page') }}">Source requests</a>
    <a class="dashboard-nav-item" href="{{ extension_zip_download_url }}" target="_blank" rel="noopener noreferrer">Extension ZIP</a>
    <span class="dashboard-nav-label">Account</span>
    <a class="dashboard-nav-item" href="{{ url_for('account_settings') }}">Settings</a>
    <a class="dashboard-nav-item" href="{{ url_for('privacy_page') }}">Privacy</a>
  </nav>
</aside>
