<aside class="dashboard-sidebar desktop-sidebar" aria-label="Library navigation">
  <div class="dashboard-sidebar-top">
    <a class="dashboard-brand sidebar-brand" href="{{ url_for('index_dashboard_alias') }}">
      <span class="dashboard-mark">MW</span>
      <span class="sidebar-brand-text">
        <strong class="sidebar-title">Manga Watchlist</strong>
        <small class="sidebar-subtitle">Current &amp; latest chapter tracking</small>
      </span>
    </a>
  </div>

  <div class="dashboard-sidebar-search sidebar-search">
    <label for="sidebarSearch" class="sr-only">Filter library titles</label>
    <input id="sidebarSearch" type="search" placeholder="Filter library titles…" autocomplete="off" aria-label="Filter library titles">
  </div>

  <nav class="dashboard-sidebar-nav sidebar-nav">
    <span class="dashboard-nav-label sidebar-section-label">Library</span>
    <a class="dashboard-nav-item sidebar-link{% if request.endpoint in ('index', 'index_dashboard_alias', 'app_library') %} is-active{% endif %}" href="{{ url_for('index_dashboard_alias') }}"><span>Library</span> <span class="dashboard-nav-ct">{{ total_count or 0 }}</span></a>
    <a class="dashboard-nav-item sidebar-link sidebar-link--primary{% if request.endpoint in ('app_add_url', 'app_add_url_alias') %} is-active{% endif %}" href="{{ url_for('app_add_url') }}"><span>Add URL</span></a>
    <a class="dashboard-nav-item sidebar-link{% if request.endpoint == 'extension_page' %} is-active{% endif %}" href="{{ url_for('extension_page') }}"><span>Extension</span></a>
    {% if show_demo_content %}
    <span class="dashboard-nav-label sidebar-section-label">Explore</span>
    <a class="dashboard-nav-item sidebar-link{% if request.endpoint == 'discover_page' %} is-active{% endif %}" href="{{ url_for('discover_page') }}"><span>Discover</span></a>
    <a class="dashboard-nav-item sidebar-link{% if request.endpoint == 'sources_page' %} is-active{% endif %}" href="{{ url_for('sources_page') }}"><span>Sources</span></a>
    <a class="dashboard-nav-item sidebar-link{% if request.endpoint == 'source_requests_page' %} is-active{% endif %}" href="{{ url_for('source_requests_page') }}"><span>Source requests</span></a>
    {% endif %}

    <div class="sidebar-bottom">
      <span class="dashboard-nav-label sidebar-section-label">Account</span>
      <a class="dashboard-nav-item sidebar-link{% if request.endpoint == 'account_settings' %} is-active{% endif %}" href="{{ url_for('account_settings') }}"><span>Settings</span></a>
      <a class="dashboard-nav-item sidebar-link" href="/export" title="Download JSON backup. Import from the menu (☰) → Restore backup."><span>Import / Export</span></a>
      <a class="dashboard-nav-item sidebar-link{% if request.endpoint == 'privacy_page' %} is-active{% endif %}" href="{{ url_for('privacy_page') }}"><span>Privacy</span></a>
    </div>
  </nav>
</aside>
