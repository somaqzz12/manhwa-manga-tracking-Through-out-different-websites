<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sign In - Manga Tracker</title>
  <style>
    :root {
      --bg-0: #05070d;
      --bg-1: #0a0d15;
      --bg-2: #111827;
      --panel: rgba(148, 163, 184, 0.08);
      --border: rgba(148, 163, 184, 0.22);
      --accent-1: #3b82f6;
      --accent-2: #2563eb;
    }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: Inter, Segoe UI, Arial, sans-serif;
      background:
        radial-gradient(420px 280px at 82% 0%, rgba(59, 130, 246, 0.18), transparent 72%),
        radial-gradient(300px 220px at 15% 8%, rgba(79, 70, 229, 0.18), transparent 70%),
        linear-gradient(160deg, var(--bg-0) 0%, var(--bg-1) 50%, var(--bg-2) 100%);
      color: #e5e7eb;
    }
    .card {
      width: min(420px, 92vw);
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 20px;
      box-shadow: 0 24px 48px rgba(2, 6, 23, 0.42);
      backdrop-filter: blur(12px);
      padding: 24px;
    }
    h1 { margin-top: 0; margin-bottom: 10px; letter-spacing: 0.01em; font-size: clamp(24px, 4vw, 30px); }
    .brand { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
    .logo {
      width: 30px;
      height: 30px;
      border-radius: 9px;
      display: grid;
      place-items: center;
      font-size: 14px;
      font-weight: 700;
      background: linear-gradient(160deg, #60a5fa 0%, #2563eb 48%, #4f46e5 100%);
      box-shadow: 0 8px 16px rgba(37, 99, 235, 0.32);
    }
    .tabs { display: flex; gap: 8px; margin-bottom: 12px; }
    .tab {
      padding: 8px 10px;
      border-radius: 10px;
      text-decoration: none;
      color: #cbd5e1;
      background: rgba(30, 41, 59, 0.65);
      border: 1px solid rgba(148, 163, 184, 0.25);
    }
    .tab.active {
      background: linear-gradient(180deg, var(--accent-1) 0%, var(--accent-2) 100%);
      color: #fff;
      box-shadow: 0 0 15px rgba(59, 130, 246, 0.45);
      border-color: transparent;
    }
    input {
      width: 100%;
      margin-bottom: 10px;
      padding: 12px;
      border-radius: 12px;
      border: 1px solid rgba(148, 163, 184, 0.3);
      background: rgba(15, 23, 42, 0.55);
      color: #f8fafc;
      box-sizing: border-box;
      outline: none;
      transition: border-color 0.15s ease, box-shadow 0.15s ease;
    }
    input:focus {
      border-color: #60a5fa;
      box-shadow: 0 0 0 3px rgba(96, 165, 250, 0.2);
    }
    button {
      width: 100%;
      padding: 12px;
      border: 0;
      border-radius: 12px;
      background: linear-gradient(180deg, var(--accent-1) 0%, var(--accent-2) 100%);
      color: #fff;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 0 15px rgba(59, 130, 246, 0.45);
    }
    .error { color: #f87171; margin-bottom: 8px; }
    button.is-loading {
      opacity: 0.8;
      cursor: wait;
    }
    button.is-loading::after {
      content: "";
      width: 12px;
      height: 12px;
      border: 2px solid rgba(255, 255, 255, 0.5);
      border-top-color: #fff;
      border-radius: 50%;
      display: inline-block;
      margin-left: 8px;
      vertical-align: -2px;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="brand">
      <div class="logo">MT</div>
      <h1>Manga Tracker</h1>
    </div>
    <div class="tabs">
      <a class="tab {% if mode == 'login' %}active{% endif %}" href="/auth?mode=login">Login</a>
      <a class="tab {% if mode == 'register' %}active{% endif %}" href="/auth?mode=register">Register</a>
    </div>
    {% if error %}<div class="error" role="alert">{{ error }}</div>{% endif %}
    <form method="post" id="authForm">
      <input type="hidden" name="action" value="{{ 'register' if mode == 'register' else 'login' }}">
      <input type="text" name="username" placeholder="Username" aria-label="Username" required>
      <input type="password" name="password" placeholder="Password" aria-label="Password" required>
      <button id="authSubmit" type="submit" data-loading-text="{{ 'Creating...' if mode == 'register' else 'Signing in...' }}">{{ 'Create account' if mode == 'register' else 'Sign in' }}</button>
    </form>
  </div>
  <script>
    const authForm = document.getElementById("authForm");
    const authSubmit = document.getElementById("authSubmit");
    authForm.addEventListener("submit", () => {
      authSubmit.dataset.originalText = authSubmit.textContent;
      authSubmit.textContent = authSubmit.getAttribute("data-loading-text") || "Working...";
      authSubmit.disabled = true;
      authSubmit.classList.add("is-loading");
    });
  </script>
</body>
</html>
