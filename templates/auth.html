<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sign In - Manga Tracker</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: Inter, Segoe UI, Arial, sans-serif;
      background:
        radial-gradient(300px 220px at 82% 0%, rgba(56, 189, 248, 0.14), transparent 70%),
        radial-gradient(240px 180px at 15% 6%, rgba(99, 102, 241, 0.16), transparent 70%),
        linear-gradient(160deg, #050816 0%, #090f23 50%, #03050d 100%);
      color: #e5e7eb;
    }
    .card {
      width: min(420px, 92vw);
      background: rgba(9, 13, 25, 0.78);
      border: 1px solid rgba(100, 116, 139, 0.28);
      border-radius: 16px;
      box-shadow: 0 18px 36px rgba(2, 6, 23, 0.45);
      backdrop-filter: blur(8px);
      padding: 22px;
    }
    h1 { margin-top: 0; margin-bottom: 10px; letter-spacing: 0.01em; }
    .tabs { display: flex; gap: 8px; margin-bottom: 12px; }
    .tab {
      padding: 8px 10px;
      border-radius: 10px;
      text-decoration: none;
      color: #cbd5e1;
      background: #1f2937;
    }
    .tab.active { background: linear-gradient(180deg, #3b82f6 0%, #2563eb 100%); color: #fff; }
    input {
      width: 100%;
      margin-bottom: 10px;
      padding: 10px;
      border-radius: 10px;
      border: 1px solid #344156;
      background: rgba(9, 18, 36, 0.85);
      color: #f8fafc;
      box-sizing: border-box;
      outline: none;
      transition: border-color 0.15s ease, box-shadow 0.15s ease;
    }
    input:focus {
      border-color: #60a5fa;
      box-shadow: 0 0 0 3px rgba(96, 165, 250, 0.2);
    }
    button {
      width: 100%;
      padding: 10px;
      border: 0;
      border-radius: 10px;
      background: linear-gradient(180deg, #3b82f6 0%, #2563eb 100%);
      color: #fff;
      font-weight: 600;
      cursor: pointer;
      box-shadow: 0 8px 18px rgba(37, 99, 235, 0.35);
    }
    .error { color: #f87171; margin-bottom: 8px; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Manga Tracker</h1>
    <div class="tabs">
      <a class="tab {% if mode == 'login' %}active{% endif %}" href="/auth?mode=login">Login</a>
      <a class="tab {% if mode == 'register' %}active{% endif %}" href="/auth?mode=register">Register</a>
    </div>
    {% if error %}<div class="error">{{ error }}</div>{% endif %}
    <form method="post">
      <input type="hidden" name="action" value="{{ 'register' if mode == 'register' else 'login' }}">
      <input type="email" name="email" placeholder="Email" required>
      <input type="password" name="password" placeholder="Password" required>
      <button type="submit">{{ 'Create account' if mode == 'register' else 'Sign in' }}</button>
    </form>
  </div>
</body>
</html>
