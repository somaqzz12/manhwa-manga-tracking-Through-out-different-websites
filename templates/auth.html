<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="{{ site_description }}">
  <title>Sign In - Manga Watchlist</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%239b6b43'/%3E%3Ctext x='16' y='21' text-anchor='middle' fill='white' font-size='12' font-family='Inter,system-ui,sans-serif' font-weight='700'%3EMW%3C/text%3E%3C/svg%3E">
  <style>
    :root {
      --bg: #f5efe6;
      --primary: #9b6b43;
      --primary-hi: #b08968;
      --text: #241c17;
      --muted: #7c6f63;
      --card-border: #e3d7c8;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: Inter, system-ui, sans-serif;
      background: var(--bg);
      background-image:
        radial-gradient(ellipse 720px 420px at 88% -6%, rgba(155, 107, 67, 0.16), transparent 52%),
        radial-gradient(ellipse 500px 360px at 8% 100%, rgba(176, 137, 104, 0.1), transparent 45%);
      color: var(--text);
      padding: 24px 16px;
    }
    .card-wrap {
      position: relative;
      width: min(440px, 100%);
    }
    .back-home {
      position: absolute;
      left: 0;
      top: -36px;
      font-size: 0.875rem;
      font-weight: 500;
      color: var(--muted);
      text-decoration: none;
      transition: color 0.2s ease;
    }
    .back-home:hover { color: var(--primary-hi); }
    .card {
      width: 100%;
      background: rgba(255, 250, 243, 0.86);
      border: 1px solid var(--card-border);
      border-radius: 16px;
      box-shadow: 0 24px 60px rgba(36, 28, 23, 0.12);
      backdrop-filter: blur(16px);
      padding: 32px 32px 28px;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }
    .brand { display: flex; align-items: center; gap: 14px; margin-bottom: 24px; }
    .logo {
      width: 48px;
      height: 48px;
      border-radius: 14px;
      display: grid;
      place-items: center;
      font-size: 16px;
      font-weight: 700;
      letter-spacing: -0.02em;
      background: linear-gradient(145deg, var(--primary-hi) 0%, var(--primary) 100%);
      box-shadow: 0 10px 32px rgba(155, 107, 67, 0.25);
      flex-shrink: 0;
    }
    h1 {
      margin: 0;
      font-size: 1.375rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--text);
    }
    .segmented {
      display: flex;
      padding: 4px;
      border-radius: 999px;
      background: #f8f1e8;
      border: 1px solid var(--card-border);
      margin-bottom: 22px;
    }
    .segmented a {
      flex: 1;
      text-align: center;
      padding: 10px 14px;
      border-radius: 999px;
      font-size: 0.875rem;
      font-weight: 600;
      text-decoration: none;
      color: var(--muted);
      transition: background 0.2s ease, color 0.2s ease, box-shadow 0.2s ease;
    }
    .segmented a.active {
      background: linear-gradient(145deg, var(--primary-hi) 0%, var(--primary) 100%);
      color: #fffaf3;
      box-shadow: 0 4px 20px rgba(155, 107, 67, 0.3);
    }
    .segmented a:not(.active):hover { color: var(--text); }
    input {
      width: 100%;
      margin-bottom: 12px;
      padding: 14px 16px;
      border-radius: 12px;
      border: 1px solid var(--card-border);
      background: #fffaf3;
      color: var(--text);
      font-family: inherit;
      font-size: 0.9375rem;
      outline: none;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }
    input::placeholder { color: #9b8b7c; }
    input:focus {
      border-color: color-mix(in srgb, var(--primary) 65%, var(--card-border));
      box-shadow: 0 0 0 3px color-mix(in srgb, var(--primary) 20%, transparent);
    }
    .error { color: #f87171; margin: 0 0 12px; font-size: 0.875rem; font-weight: 500; }
    .hint { color: var(--muted); font-size: 0.8125rem; margin: -4px 0 14px; }
    button[type="submit"] {
      width: 100%;
      margin-top: 4px;
      padding: 14px 20px;
      border: 0;
      border-radius: 999px;
      font-family: inherit;
      font-size: 0.9375rem;
      font-weight: 700;
      cursor: pointer;
      background: linear-gradient(145deg, var(--primary-hi) 0%, var(--primary) 100%);
      color: #f8fafc;
      box-shadow: 0 8px 28px rgba(155, 107, 67, 0.28);
      transition: transform 0.2s ease, box-shadow 0.2s ease, opacity 0.2s ease;
    }
    button[type="submit"]:hover:not(:disabled) {
      transform: translateY(-1px);
      box-shadow: 0 12px 36px rgba(155, 107, 67, 0.36);
    }
    button[type="submit"]:focus-visible {
      outline: 2px solid var(--primary-hi);
      outline-offset: 3px;
    }
    button.is-loading {
      cursor: wait;
      opacity: 0.92;
    }
    .btn-spinner {
      display: inline-block;
      width: 1.25rem;
      height: 1.25rem;
      border: 2px solid rgba(255, 255, 255, 0.35);
      border-top-color: #fff;
      border-radius: 50%;
      vertical-align: middle;
      animation: spin 0.75s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    @media (max-width: 375px) {
      .card { padding: 24px 20px; }
      .back-home { top: -32px; font-size: 0.8125rem; }
    }
  </style>
</head>
<body>
  <div class="card-wrap">
    <a class="back-home" href="/">← Back to home</a>
    <div class="card">
      <div class="brand">
        <div class="logo" aria-hidden="true">MW</div>
        <h1>Manga Watchlist</h1>
      </div>
      <div class="segmented" role="tablist">
        {% if auth_next %}
        <a class="{% if mode == 'login' %}active{% endif %}" href="{{ url_for('auth_page', mode='login', next=auth_next) }}" role="tab" aria-selected="{{ 'true' if mode == 'login' else 'false' }}">Login</a>
        <a class="{% if mode == 'register' %}active{% endif %}" href="{{ url_for('auth_page', mode='register', next=auth_next) }}" role="tab" aria-selected="{{ 'true' if mode == 'register' else 'false' }}">Register</a>
        {% else %}
        <a class="{% if mode == 'login' %}active{% endif %}" href="{{ url_for('auth_page', mode='login') }}" role="tab" aria-selected="{{ 'true' if mode == 'login' else 'false' }}">Login</a>
        <a class="{% if mode == 'register' %}active{% endif %}" href="{{ url_for('auth_page', mode='register') }}" role="tab" aria-selected="{{ 'true' if mode == 'register' else 'false' }}">Register</a>
        {% endif %}
      </div>
      {% if error %}<div class="error" role="alert">{{ error }}</div>{% endif %}
      <form method="post" id="authForm">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <input type="hidden" name="action" value="{{ 'register' if mode == 'register' else 'login' }}">
        {% if auth_next %}<input type="hidden" name="next" value="{{ auth_next|e }}">{% endif %}
        <input type="text" name="username" placeholder="Username" aria-label="Username" autocomplete="username" maxlength="64" required>
        <input
          type="password"
          name="password"
          placeholder="Password"
          aria-label="Password"
          autocomplete="{{ 'new-password' if mode == 'register' else 'current-password' }}"
          {% if mode == 'register' %}minlength="{{ min_password_length }}"{% endif %}
          maxlength="256"
          required>
        {% if mode == 'register' %}
          <p class="hint">Use at least {{ min_password_length }} characters.</p>
        {% endif %}
        <button id="authSubmit" type="submit" data-loading-label="{{ 'Creating...' if mode == 'register' else 'Signing in...' }}">{{ 'Create account' if mode == 'register' else 'Sign in' }}</button>
      </form>
    </div>
  </div>
  <script>
    const authForm = document.getElementById("authForm");
    const authSubmit = document.getElementById("authSubmit");
    authForm.addEventListener("submit", () => {
      authSubmit.dataset.originalHtml = authSubmit.innerHTML;
      authSubmit.innerHTML = '<span class="btn-spinner" aria-hidden="true"></span>';
      authSubmit.disabled = true;
      authSubmit.classList.add("is-loading");
      authSubmit.setAttribute("aria-busy", "true");
    });
  </script>
</body>
</html>
