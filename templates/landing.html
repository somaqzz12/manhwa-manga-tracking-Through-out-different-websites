<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manga Tracker</title>
  <style>
    :root {
      --bg-0: #05070d;
      --bg-1: #0a0d15;
      --bg-2: #111827;
      --panel: rgba(148, 163, 184, 0.08);
      --border: rgba(148, 163, 184, 0.22);
      --accent-1: #3b82f6;
      --accent-2: #2563eb;
    }
    body {
      margin: 0;
      font-family: Inter, "Segoe UI", Arial, sans-serif;
      background:
        radial-gradient(420px 280px at 82% 0%, rgba(59, 130, 246, 0.18), transparent 72%),
        radial-gradient(300px 220px at 15% 8%, rgba(79, 70, 229, 0.18), transparent 70%),
        linear-gradient(160deg, var(--bg-0) 0%, var(--bg-1) 50%, var(--bg-2) 100%);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 20px;
    }
    .box {
      max-width: 560px;
      width: 100%;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 26px;
      backdrop-filter: blur(12px);
      box-shadow: 0 24px 48px rgba(2, 6, 23, 0.42);
    }
    .logo {
      width: 44px;
      height: 44px;
      margin: 0 auto 10px;
      border-radius: 12px;
      display: grid;
      place-items: center;
      font-weight: 700;
      background: linear-gradient(160deg, #60a5fa 0%, #2563eb 48%, #4f46e5 100%);
      box-shadow: 0 10px 20px rgba(37, 99, 235, 0.32);
    }
    h1 { font-size: 36px; margin: 0 0 10px; }
    p { color: #94a3b8; margin: 0; }
    .actions { margin-top: 20px; display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; }
    .btn {
      display: inline-block;
      text-decoration: none;
      padding: 12px 20px;
      border-radius: 12px;
      border: none;
      cursor: pointer;
      font-weight: 600;
    }
    .btn:focus-visible {
      outline: 2px solid #60a5fa;
      outline-offset: 2px;
    }
    .primary {
      background: linear-gradient(180deg, var(--accent-1) 0%, var(--accent-2) 100%);
      color: white;
      box-shadow: 0 0 15px rgba(59, 130, 246, 0.45);
    }
    .secondary {
      background: rgba(30, 41, 59, 0.68);
      color: white;
      border: 1px solid rgba(148, 163, 184, 0.3);
    }
    .foot { margin-top: 24px; font-size: 12px; color: #94a3b8; }
  </style>
</head>
<body>
  <div class="box">
    <div class="logo">MT</div>
    <h1>Manga Tracker</h1>
    <p>Track manga and manhwa updates automatically in one clean dashboard.</p>
    <div class="actions">
      <a href="/auth" class="btn primary" aria-label="Get started with Manga Tracker">Get Started</a>
      <a href="/dashboard" class="btn secondary" aria-label="Open Manga Tracker dashboard">Open Dashboard</a>
    </div>
    <p class="foot">Early version - report bugs anytime.</p>
    <p class="foot"><a href="mailto:you@example.com" style="color:#93c5fd;">Report a bug</a></p>
  </div>
</body>
</html>
