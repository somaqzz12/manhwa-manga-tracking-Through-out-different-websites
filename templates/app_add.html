<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Add URL - Manga Watchlist</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/public-pages.css') }}">
</head>
<body class="public-simple">
  <main class="box box--narrow">
    <h1 style="margin-top:0;">Add URL</h1>
    <p>Paste a series URL to resolve it. If automatic detection is unavailable, manual tracking still works.</p>
    <form id="resolveForm" style="display:flex;gap:8px;flex-wrap:wrap;">
      <input class="url-input" id="urlInput" type="url" placeholder="https://example.com/series/solo-leveling" required>
      <button type="submit">Resolve URL</button>
    </form>
    <div id="out" style="margin-top:14px;white-space:normal;background:#fff;padding:12px;border-radius:12px;border:1px solid rgba(92,64,45,.2);"></div>
    <p><a href="/app">Back to dashboard</a></p>
  </main>
  <script>
    let lastPreview = null;

    async function addFromPreview() {
      if (!lastPreview) return;
      const manualTitle = document.getElementById("manualTitle")?.value?.trim() || "";
      const manualLatest = document.getElementById("manualLatest")?.value?.trim() || "";
      const payload = {
        url: lastPreview.source_url || document.getElementById("urlInput").value.trim(),
        title: manualTitle || lastPreview.title || "",
        canonical_title: lastPreview.canonical_title || "",
        description: lastPreview.description || "",
        chapter_count: lastPreview.chapter_count || "",
        cover_url: lastPreview.cover_url || "",
        latest_chapter: manualLatest || lastPreview.latest_chapter || "",
        support_level: lastPreview.support_level || "manual_only",
        source_name: lastPreview.source_name || "",
      };
      const res = await fetch("/api/library/add-from-preview", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload),
      });
      const data = await res.json();
      if (!res.ok || !data.ok) {
        alert(data.error || "Failed to add to library");
        return;
      }
      if (data.duplicate) {
        alert("This URL is already in your library.");
      } else {
        alert("Added to library.");
      }
      window.location.href = "/app";
    }

    function renderPreview(data) {
      const chapters = Array.isArray(data.chapters) ? data.chapters.length : (data.chaptersFound || 0);
      const chapterCount = data.chapter_count || chapters || "";
      const warnings = Array.isArray(data.warnings) && data.warnings.length
        ? `<ul>${data.warnings.map((w) => `<li>${w}</li>`).join("")}</ul>`
        : "<p>No warnings.</p>";
      const manual = (data.support_level || "").toLowerCase() === "manual_only";
      const cover = data.cover_url
        ? `<img src="${data.cover_url}" alt="" style="width:110px;height:154px;object-fit:cover;border-radius:10px;border:1px solid rgba(92,64,45,.2);">`
        : `<div style="width:110px;height:154px;border-radius:10px;border:1px solid rgba(92,64,45,.2);display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#f1e4d2,#e4d2bc);font-weight:700;color:#7f5438;">MW</div>`;
      const desc = data.description ? `<p style="margin:8px 0 0;color:#6f5f50;">${data.description}</p>` : "";
      const manualFields = manual ? `
        <div style="margin-top:10px;display:grid;gap:8px;">
          <input id="manualTitle" placeholder="Title (required for manual tracking)" value="${(data.title || "").replace(/"/g, "&quot;")}">
          <input id="manualLatest" placeholder="Latest chapter (optional)" value="${(data.latest_chapter || "").toString().replace(/"/g, "&quot;")}">
        </div>
      ` : "";
      return `
        <div style="display:flex;gap:12px;align-items:flex-start;">
          ${cover}
          <div style="flex:1;min-width:0;">
            <h3 style="margin:0 0 8px;">${data.canonical_title || data.title || "Unknown title"}</h3>
            <p style="margin:0 0 4px;"><strong>Source:</strong> ${data.source_name || "-"}</p>
            <p style="margin:0 0 4px;"><strong>Support:</strong> ${data.support_level || "-"}</p>
            <p style="margin:0 0 4px;"><strong>Latest chapter:</strong> ${data.latest_chapter || "Unknown"}</p>
            <p style="margin:0 0 4px;"><strong>Chapter count:</strong> ${chapterCount || "Unknown"}</p>
            ${desc}
          </div>
        </div>
        ${warnings}
        ${manualFields}
        <div style="margin-top:10px;">
          <button id="addToLibraryBtn" type="button">Add to Library</button>
        </div>
      `;
    }

    document.getElementById("resolveForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      const url = document.getElementById("urlInput").value.trim();
      const res = await fetch("/api/resolve-url", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ url }) });
      const data = await res.json();
      if (!res.ok || data.error) {
        document.getElementById("out").innerHTML = `<p><strong>Could not detect this source.</strong></p><p>${data.error || "Unknown error"}</p>`;
        return;
      }
      lastPreview = data;
      document.getElementById("out").innerHTML = renderPreview(data);
      document.getElementById("addToLibraryBtn")?.addEventListener("click", addFromPreview);
    });
  </script>
</body>
</html>
