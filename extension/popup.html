<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Manga Tracker</title>
  <style>
    body {
      font-family: Inter, Segoe UI, Arial, sans-serif;
      width: 320px;
      margin: 0;
      padding: 14px;
      color: #e5e7eb;
      background: radial-gradient(circle at top right, #16213f 0%, #0b1020 45%, #05070f 100%);
    }
    .title { font-size: 18px; font-weight: 700; margin-bottom: 4px; }
    .sub { color: #94a3b8; font-size: 12px; margin-bottom: 12px; }
    .row { margin-bottom: 10px; }
    input[type="text"] {
      width: 100%;
      padding: 10px;
      border: 1px solid #344156;
      border-radius: 10px;
      background: #0b1327;
      color: #f8fafc;
      box-sizing: border-box;
    }
    button {
      width: 100%;
      padding: 10px;
      border: 0;
      border-radius: 10px;
      cursor: pointer;
      font-weight: 600;
      color: #fff;
      background: #2563eb;
    }
    button.secondary { background: #334155; }
    .status {
      min-height: 36px;
      font-size: 12px;
      color: #cbd5e1;
      padding: 8px;
      border-radius: 8px;
      background: rgba(15, 23, 42, 0.75);
      border: 1px solid rgba(71, 85, 105, 0.35);
      white-space: pre-wrap;
    }
  </style>
</head>
<body>
  <div class="title">Manga Tracker</div>
  <div class="sub">Automatic chapter tracking, plus manual add.</div>
  <div class="row">
    <input id="apiBase" type="text" placeholder="Backend URL (https://your-app.onrender.com)">
  </div>
  <div class="row">
    <button id="saveApiBase">Save Backend URL</button>
  </div>
  <div class="row">
    <button id="manualAdd">Add this page to registry</button>
  </div>
  <div class="row">
    <button class="secondary" id="openDashboard">Open dashboard</button>
  </div>
  <div id="status" class="status">Ready.</div>
  <script src="popup.js"></script>
</body>
</html>
