<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Manga Tracker</title>
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }
    body {
      font-family: Inter, "Segoe UI", Arial, sans-serif;
      width: 340px;
      margin: 0;
      padding: 14px;
      color: #e5e7eb;
      background:
        radial-gradient(140px 90px at 85% 8%, rgba(56, 189, 248, 0.16), transparent 70%),
        radial-gradient(180px 110px at 12% 0%, rgba(99, 102, 241, 0.18), transparent 70%),
        linear-gradient(165deg, #050816 0%, #090f23 52%, #04070f 100%);
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
    }
    .logo {
      width: 28px;
      height: 28px;
      border-radius: 8px;
      display: grid;
      place-items: center;
      font-size: 14px;
      font-weight: 800;
      background: linear-gradient(160deg, #60a5fa 0%, #2563eb 48%, #4f46e5 100%);
      box-shadow: 0 8px 16px rgba(37, 99, 235, 0.32);
    }
    .title {
      font-size: 16px;
      font-weight: 700;
      letter-spacing: 0.01em;
      color: #f8fafc;
    }
    .conn {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-left: auto;
      font-size: 11px;
      color: #9fb0ca;
    }
    .dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: #6b7280;
      box-shadow: 0 0 0 0 rgba(96, 165, 250, 0.4);
    }
    .dot.green { background: #22c55e; box-shadow: 0 0 0 4px rgba(34, 197, 94, 0.18); }
    .dot.amber { background: #f59e0b; box-shadow: 0 0 0 4px rgba(245, 158, 11, 0.18); }
    .dot.red { background: #ef4444; box-shadow: 0 0 0 4px rgba(239, 68, 68, 0.18); }

    .panel {
      background: rgba(10, 19, 36, 0.7);
      border: 1px solid rgba(71, 85, 105, 0.45);
      border-radius: 12px;
      padding: 14px;
      margin-bottom: 10px;
    }
    .panel .label {
      color: #93c5fd;
      font-size: 11px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      margin-bottom: 6px;
    }
    .panel .value {
      font-size: 14px;
      font-weight: 600;
      color: #f8fafc;
      word-break: break-word;
      line-height: 1.35;
    }
    .panel .meta {
      color: #9fb0ca;
      font-size: 12px;
      margin-top: 4px;
    }
    .panel .empty {
      color: #9fb0ca;
      font-size: 12.5px;
      line-height: 1.5;
    }

    button {
      width: 100%;
      padding: 11px;
      border: 0;
      border-radius: 12px;
      cursor: pointer;
      font-weight: 600;
      color: #fff;
      background: linear-gradient(180deg, #3b82f6 0%, #2563eb 100%);
      box-shadow: 0 8px 18px rgba(37, 99, 235, 0.35);
      transition: transform 0.15s ease, filter 0.15s ease;
      font: inherit;
    }
    button:hover:not(:disabled) {
      transform: translateY(-1px);
      filter: brightness(1.05);
    }
    button:disabled {
      cursor: default;
      filter: saturate(0.5) brightness(0.85);
      box-shadow: none;
    }
    button.secondary {
      background: linear-gradient(180deg, #46566f 0%, #334155 100%);
      box-shadow: none;
    }
    .row { margin-bottom: 8px; }

    .status {
      min-height: 18px;
      font-size: 12px;
      color: #9fb0ca;
      margin-top: 6px;
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 12px;
      transform: translateX(-50%) translateY(8px);
      min-width: 260px;
      max-width: 300px;
      padding: 10px 12px;
      border-radius: 10px;
      font-size: 12px;
      border: 1px solid rgba(71, 85, 105, 0.45);
      background: rgba(10, 19, 36, 0.94);
      color: #e2e8f0;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s ease, transform 0.2s ease;
      white-space: pre-wrap;
    }
    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
    .toast.success { border-color: rgba(34, 197, 94, 0.45); }
    .toast.error { border-color: rgba(239, 68, 68, 0.5); }

    .loading {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 14px 0;
      color: #9fb0ca;
      font-size: 12px;
    }
    .spinner {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      border: 2px solid rgba(148, 163, 184, 0.25);
      border-top-color: #60a5fa;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .hidden { display: none !important; }

    .footer-links {
      display: flex;
      gap: 8px;
      margin-top: 8px;
    }
    .footer-links button { flex: 1; }
    .badge {
      display: inline-block;
      font-size: 11px;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 999px;
      margin-left: 6px;
      background: rgba(37, 99, 235, 0.25);
      color: #bfdbfe;
      border: 1px solid rgba(96, 165, 250, 0.3);
    }
  </style>
</head>
<body>
  <div class="brand">
    <div class="logo">MT</div>
    <div class="title">Manga Tracker</div>
    <div class="conn" title="Backend connection">
      <span id="connDot" class="dot"></span>
      <span id="connText">Checking...</span>
    </div>
  </div>

  <div id="loading" class="loading">
    <div class="spinner" aria-hidden="true"></div>
    <span>Loading...</span>
  </div>

  <div id="content" class="hidden">
    <!-- State: not configured -->
    <div id="stateNotConfigured" class="hidden">
      <div class="panel">
        <div class="label">Backend offline</div>
        <div id="notConfiguredMessage" class="empty">Add your backend URL in settings, then come back.</div>
      </div>
      <div class="row">
        <button id="openOptions">Open settings</button>
      </div>
    </div>

    <!-- State: not a chapter page -->
    <div id="stateNoChapter" class="hidden">
      <div class="panel">
        <div class="label">No chapter detected</div>
        <div class="empty">Open a manga or manhwa chapter and reopen this popup to track it.</div>
      </div>
      <div id="noChapterUnread" class="panel hidden">
        <div class="label">Unread chapters</div>
        <div id="noChapterUnreadValue" class="value">0</div>
      </div>
    </div>

    <!-- State: chapter page -->
    <div id="stateChapter" class="hidden">
      <div class="panel">
        <div class="label">Series<span id="trackedBadge" class="badge hidden">tracked</span></div>
        <div id="seriesTitle" class="value">—</div>
        <div id="chapterMeta" class="meta">—</div>
      </div>
      <div class="row">
        <button id="trackButton">Track now</button>
      </div>
    </div>

    <div class="footer-links">
      <button class="secondary" id="openDashboard">Open dashboard</button>
      <button class="secondary" id="openOptionsFooter">Settings</button>
    </div>

    <div id="status" class="status"></div>
  </div>

  <div id="toast" class="toast"></div>
  <script src="popup.js"></script>
</body>
</html>
